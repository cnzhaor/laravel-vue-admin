services:
  app:
    image: laravelvue-app
    build:
      context: .
      dockerfile: deploy/php/Dockerfile
    working_dir: /var/www/backend
    volumes:
      - ./backend:/var/www/backend
    env_file:
      - ./backend/.env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  queue:
    image: laravelvue-app
    build:
      context: .
      dockerfile: deploy/php/Dockerfile
    working_dir: /var/www/backend
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=90
    volumes:
      - ./backend:/var/www/backend
    env_file:
      - ./backend/.env
    depends_on:
      - app

  scheduler:
    image: laravelvue-app
    build:
      context: .
      dockerfile: deploy/php/Dockerfile
    working_dir: /var/www/backend
    command: php artisan schedule:work
    volumes:
      - ./backend:/var/www/backend
    env_file:
      - ./backend/.env
    depends_on:
      - app

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend/public:/var/www/backend/public:ro
    depends_on:
      - app
      - frontend

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-admin}
      MYSQL_USER: ${DB_USERNAME:-admin}
      MYSQL_PASSWORD: ${DB_PASSWORD:-admin_secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_secret}
      TZ: Asia/Shanghai

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 20

  adminer:
    image: laravelvue-app
    working_dir: /var/www/adminer
    command: sh -c "test -s index.php || php -r 'file_put_contents(\"index.php\", file_get_contents(\"https://www.adminer.org/latest.php\"));'; php -S 0.0.0.0:8080"
    ports:
      - "127.0.0.1:${ADMINER_PORT:-8081}:8080"
    volumes:
      - adminer_data:/var/www/adminer
    depends_on:
      mysql:
        condition: service_healthy

  redis:
    image: redis:7.4-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  mysql_data:
  redis_data:
  frontend_node_modules:
  adminer_data:
